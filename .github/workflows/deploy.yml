name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [main]
    paths: [pwa/**]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pwa/package-lock.json

      - name: Install & build
        working-directory: pwa
        env:
          # Stamp the build with the short commit SHA — visible in app header
          # so we can verify which build a device is loading.
          VITE_BUILD: ${{ github.sha }}
        run: |
          npm ci --legacy-peer-deps
          export VITE_BUILD="${GITHUB_SHA:0:7}"
          npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pwa/dist

      - id: deployment
        uses: actions/deploy-pages@v4
        timeout-minutes: 15
