name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [main]
    paths: [pwa/**]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pwa/package-lock.json

      - name: Install & build
        working-directory: pwa
        env:
          # Stamp the build with the short commit SHA — visible in app header
          # so we can verify which build a device is loading.
          VITE_BUILD: ${{ github.sha }}
          # Private read path (Firebase). All public-safe → repo VARIABLES, not
          # secrets. Empty until Caspar sets them → VITE_DATA_SOURCE undefined →
          # data.ts falls back to the gviz path, so the build is unchanged today.
          # Cutover = set these 7 repo variables (Settings → Variables → Actions)
          # incl. VITE_DATA_SOURCE=firestore, then redeploy.
          VITE_DATA_SOURCE: ${{ vars.VITE_DATA_SOURCE }}
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
        run: |
          npm ci --legacy-peer-deps
          export VITE_BUILD="${GITHUB_SHA:0:7}"
          npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pwa/dist

      - id: deployment
        uses: actions/deploy-pages@v4
        timeout-minutes: 15
