name: Tail Hedge — Weekly (RETIRED)

# RETIRED 2026-06-04 — superseded by the unified daily_plan, whose standing
# allocation now owns the VIXM hedge sleeve. This script's only output was a
# hedge DecisionRow in decision_queue, which is now redundant noise on the
# Decisions page. Schedule DISABLED; left dispatch-only. Do NOT re-enable.

on:
  # schedule:                  # DISABLED — hedge lives in the unified daily_plan
  #   - cron: "15 23 * * 1"
  workflow_dispatch:
    inputs:
      dry:
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: tail-hedge
  cancel-in-progress: true

jobs:
  hedge:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      OAUTH_TOKEN_JSON: ${{ secrets.OAUTH_TOKEN_JSON }}
      SHEET_ID:         ${{ secrets.SHEET_ID }}
      DRIVE_FOLDER_ID:  ${{ secrets.DRIVE_FOLDER_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project deps
        run: pip install -r requirements.txt

      - name: Run tail_hedge
        run: |
          ARGS=""
          if [ "${{ inputs.dry }}" = "true" ]; then ARGS="--dry"; fi
          python scripts/tail_hedge_run.py $ARGS
