name: Unusual Options Activity — Daily UOA Scan

on:
  schedule:
    # 14:30 UTC = 22:30 SGT (after US market close, final volume available)
    - cron: "30 14 * * 1-5"
  workflow_dispatch:
    inputs:
      dry:
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: unusual-options-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      OAUTH_TOKEN_JSON:    ${{ secrets.OAUTH_TOKEN_JSON }}
      SHEET_ID:            ${{ secrets.SHEET_ID }}
      TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run unusual options activity scan
        run: |
          ARGS=""
          if [ "${{ inputs.dry }}" = "true" ]; then ARGS="--dry"; fi
          python scripts/unusual_options_scan.py $ARGS
