name: TV Prices — 5-min Live Refresh

on:
  schedule:
    # Every 5 min. 288 runs/day × ~10s = ~48 min/day = ~24h/month.
    # GH Actions free tier is 2000 min/month — well within budget.
    # Off-hours runs are mostly idempotent (close prices don't change)
    # but trivially cheap, and they ensure the freshness chip on the PWA
    # never shows "X hours ago" just because the user opened the app
    # outside US market hours.
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      dry:
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: tv-prices
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      OAUTH_TOKEN_JSON: ${{ secrets.OAUTH_TOKEN_JSON }}
      SHEET_ID:         ${{ secrets.SHEET_ID }}
      DRIVE_FOLDER_ID:  ${{ secrets.DRIVE_FOLDER_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Refresh live prices
        run: |
          set -euo pipefail
          if [ "${{ github.event.inputs.dry }}" = "true" ]; then
            python scripts/tv_price_refresh.py --dry
          else
            python scripts/tv_price_refresh.py
          fi
