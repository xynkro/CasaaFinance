name: TV Prices — 5-min Market Hours

on:
  schedule:
    # Every 5 min during US market hours (Mon-Fri 09:30-16:00 ET = 13:30-20:00 UTC).
    # ~78 runs/day (down from 288). Off-hours prices don't move.
    - cron: "*/5 13-21 * * 1-5"
  workflow_dispatch:
    inputs:
      dry:
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: tv-prices
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      OAUTH_TOKEN_JSON: ${{ secrets.OAUTH_TOKEN_JSON }}
      SHEET_ID:         ${{ secrets.SHEET_ID }}
      DRIVE_FOLDER_ID:  ${{ secrets.DRIVE_FOLDER_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Refresh live prices
        run: |
          set -euo pipefail
          if [ "${{ github.event.inputs.dry }}" = "true" ]; then
            python scripts/tv_price_refresh.py --dry
          else
            python scripts/tv_price_refresh.py
          fi
