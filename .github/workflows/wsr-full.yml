name: WSR Full — Claude Code (Max)

on:
  schedule:
    # 11:37 UTC Sunday = 19:37 SGT (for Mon morning)
    - cron: "37 11 * * 0"
  workflow_dispatch:
    inputs:
      dry:
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: read
  issues: read
  id-token: write

concurrency:
  group: wsr-full
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run WSR Full brain
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Read prompts/cron_wsr_full.md and execute the full Monday WSR workflow.

            CI context:
            - Running on ubuntu-latest; Sheets/Drive auth via env vars.
            - DRY_RUN=${{ inputs.dry }} — if true, pass --dry to push_brief invocations.
            - Web research is critical for the WSR — use web_search liberally.
            - Use Agent tool with model=sonnet for the markdown formatting step.
            - This is the deepest synthesis of the week. Take your time.
        env:
          OAUTH_TOKEN_JSON: ${{ secrets.OAUTH_TOKEN_JSON }}
          SHEET_ID:         ${{ secrets.SHEET_ID }}
          DRIVE_FOLDER_ID:  ${{ secrets.DRIVE_FOLDER_ID }}
