name: Premium Harvest Scan — High-IV Universe

on:
  schedule:
    # 02:40 UTC = 10:40 SGT (5 min after daily_options_scan, fresh chains)
    - cron: "40 2 * * 1-5"
  workflow_dispatch:
    inputs:
      dry:
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: premium-harvest-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OAUTH_TOKEN_JSON:    ${{ secrets.OAUTH_TOKEN_JSON }}
      SHEET_ID:            ${{ secrets.SHEET_ID }}
      TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run premium harvest scan
        run: |
          ARGS=""
          if [ "${{ inputs.dry }}" = "true" ]; then ARGS="--dry"; fi
          python scripts/premium_harvest_scan.py $ARGS
