name: IV Surface Scan — Volatility Surface

on:
  schedule:
    # 14:38 UTC = 10:38 AM ET — ~1h AFTER the open, when option quotes are LIVE.
    # The old 13:04 slot was PRE-market: bids collapse to 0.01, sizes vanish, and
    # IV/delta computed from those mids is garbage — exactly what the Scanner
    # page was rendering. Minute :38 keeps the stagger contract (off the */10
    # trigger-alerts spine; clear of 14:03 plan, 14:33 alpaca, 14:36
    # unusual-options, :05/:35 options-refresh, :07/:37 yahoo-grab).
    - cron: "38 14 * * 1-5"
  workflow_dispatch:
    inputs:
      dry:
        type: boolean
        default: false
      tickers:
        type: string
        description: "Space-separated ticker override (blank = portfolio + harvest)"
        default: ""

permissions:
  contents: read

concurrency:
  group: iv-surface-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OAUTH_TOKEN_JSON:    ${{ secrets.OAUTH_TOKEN_JSON }}
      SHEET_ID:            ${{ secrets.SHEET_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run IV surface scan
        run: |
          ARGS=""
          if [ "${{ inputs.dry }}" = "true" ]; then ARGS="$ARGS --dry"; fi
          if [ -n "${{ inputs.tickers }}" ]; then ARGS="$ARGS --tickers ${{ inputs.tickers }}"; fi
          python scripts/iv_surface_scan.py $ARGS
