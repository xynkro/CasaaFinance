name: Finnhub Analyst — Weekly Consensus

on:
  schedule:
    # Sunday 12:02 UTC (~20:02 SGT) — runs ahead of WSR Full at 19:37 SGT
    # Wait, that's after — but WSR Full reads from sheets at brain time
    # so the 12:02 UTC run feeds the same-day WSR Full. Analyst recs
    # barely shift week-to-week so weekly cadence is plenty.
    # Offset to :02 (was :00) to stagger off the 12:00 Sun sheet-write trio
    # (options-yield, poll-drive-wsr) — avoids 429s.
    - cron: "2 12 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: finnhub-analyst
  cancel-in-progress: true

jobs:
  pull:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      OAUTH_TOKEN_JSON: ${{ secrets.OAUTH_TOKEN_JSON }}
      SHEET_ID:         ${{ secrets.SHEET_ID }}
      DRIVE_FOLDER_ID:  ${{ secrets.DRIVE_FOLDER_ID }}
      FINNHUB_API_KEY:  ${{ secrets.FINNHUB_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Pull analyst consensus
        run: python scripts/finnhub_analyst.py
