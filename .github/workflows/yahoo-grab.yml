name: Yahoo Grab — 30-min Market Hours

on:
  schedule:
    # Every 30 min during US market hours (Mon-Fri 13-21 UTC).
    # ~18 runs/day (down from 96). Off-hours prices barely move.
    - cron: "7,37 13-21 * * 1-5"
  workflow_dispatch:
    inputs:
      dry:
        type: boolean
        default: false
      caspar_only:
        type: boolean
        default: false
      sarah_only:
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: yahoo-grab
  cancel-in-progress: true   # if a previous hour's run is still going, kill it

jobs:
  grab:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      OAUTH_TOKEN_JSON: ${{ secrets.OAUTH_TOKEN_JSON }}
      SHEET_ID:         ${{ secrets.SHEET_ID }}
      DRIVE_FOLDER_ID:  ${{ secrets.DRIVE_FOLDER_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run yahoo_grab
        run: |
          ARGS=""
          if [ "${{ inputs.dry }}" = "true" ]; then ARGS="$ARGS --dry"; fi
          if [ "${{ inputs.caspar_only }}" = "true" ]; then ARGS="$ARGS --caspar"; fi
          if [ "${{ inputs.sarah_only }}" = "true" ]; then ARGS="$ARGS --sarah"; fi
          python src/yahoo_grab.py $ARGS
      - name: Refresh live_prices (was tv-prices workflow)
        run: python scripts/tv_price_refresh.py
