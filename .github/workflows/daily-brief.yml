name: Daily Brief — Claude Code (Max)

on:
  schedule:
    # 23:03 UTC Sun-Thu = 07:03 SGT Mon-Fri
    - cron: "3 23 * * 0-4"
  workflow_dispatch:
    inputs:
      dry:
        description: "Dry run (no Sheets/Drive write)"
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: read
  issues: read
  id-token: write

concurrency:
  group: daily-brief
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run daily brief brain
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Opus model + tool allowlist — without these the agent runs on
          # Sonnet 4.6 and gets permission_denials, writing zero rows.
          # Verified via wsr-lite run 25148391455.
          claude_args: "--verbose --model claude-opus-4-7 --allowed-tools Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch,Task,TodoWrite"
          prompt: |
            Read prompts/cron_daily_brief.md and execute the workflow it describes.

            IMPORTANT context for this CI run:
            - You are running in GitHub Actions on ubuntu-latest, not on the user's Mac.
            - Sheets/Drive credentials are in env vars (OAUTH_TOKEN_JSON, SHEET_ID, DRIVE_FOLDER_ID).
              The src/sheets.py and src/drive.py code automatically uses them when present —
              you don't need to set up auth, just call the scripts.
            - Python venv is set up; run scripts directly with `python scripts/...`
            - DRY_RUN=${{ inputs.dry }} — if "true", pass --dry to push_brief.py invocations.

            Use the Bash, Read, Write tools. Use web_search for overnight news.
            For the Sonnet-formatting step, use the Agent tool with model=sonnet.
        env:
          OAUTH_TOKEN_JSON: ${{ secrets.OAUTH_TOKEN_JSON }}
          SHEET_ID:         ${{ secrets.SHEET_ID }}
          DRIVE_FOLDER_ID:  ${{ secrets.DRIVE_FOLDER_ID }}
