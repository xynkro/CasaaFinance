name: Telegram Portfolio Responder — 2-min poll

# Polls the Finance & Trading supergroup's "Portfolio Ping" topic for
# `~/portfolio` (or `/portfolio` / `~/positions` / `~/snapshot`) commands
# and replies with the sender's account snapshot.
#
# Each user is mapped to an account via repo secrets:
#   - TELEGRAM_USER_CASPAR  → caspar
#   - TELEGRAM_USER_SARAH   → sarah
# Unknown senders get a polite "I don't know you yet" reply with their
# user_id printed so an admin can register them.
#
# State: `telegram_offset` sheet (single row) tracks the last processed
# update_id so re-runs don't re-reply to the same message.
#
# Schedule: every 2 min during waking hours (07:00-23:00 SGT = ~23:00
# UTC -> 15:00 UTC the next day). Compressed to working window so we
# don't burn cron minutes overnight.

on:
  schedule:
    # Every 2 min, between 23:00 UTC and 15:00 UTC (= 07:00-23:00 SGT)
    # Cron's range syntax doesn't span midnight cleanly, so two ranges:
    - cron: "*/2 23 * * *"
    - cron: "*/2 0-15 * * *"
  workflow_dispatch:
    inputs:
      reset:
        description: "Reset offset to 0 (replay last 24h)"
        type: boolean
        default: false
      dry:
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: telegram-portfolio-responder
  cancel-in-progress: true

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      OAUTH_TOKEN_JSON:        ${{ secrets.OAUTH_TOKEN_JSON }}
      SHEET_ID:                ${{ secrets.SHEET_ID }}
      DRIVE_FOLDER_ID:         ${{ secrets.DRIVE_FOLDER_ID }}
      TELEGRAM_BOT_TOKEN:      ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_USER_CASPAR:    ${{ secrets.TELEGRAM_USER_CASPAR }}
      TELEGRAM_USER_SARAH:     ${{ secrets.TELEGRAM_USER_SARAH }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run portfolio responder
        run: |
          ARGS=""
          if [ "${{ inputs.reset }}" = "true" ]; then ARGS="$ARGS --reset"; fi
          if [ "${{ inputs.dry }}" = "true" ]; then ARGS="$ARGS --dry"; fi
          python scripts/telegram_portfolio_responder.py $ARGS
