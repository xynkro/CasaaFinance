name: WSR Lite — Claude Code (Max)

on:
  schedule:
    # 11:33 UTC Wed/Fri = 19:33 SGT
    - cron: "33 11 * * 3,5"
  workflow_dispatch:
    inputs:
      dry:
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: read
  issues: read
  id-token: write

concurrency:
  group: wsr-lite
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run WSR Lite brain
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Verbose stream so we see tool calls in the GH Actions log.
          # Allow the tools the brain needs (default deny was causing
          # permission_denials_count: 11 -> agent ran for 105s but wrote zero).
          claude_args: "--verbose --model claude-opus-4-7 --allowed-tools Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch,Task,TodoWrite"
          prompt: |
            Read prompts/cron_wsr_lite.md and execute the workflow.

            CI context:
            - Running on ubuntu-latest; Sheets/Drive auth via env vars (already wired).
            - DRY_RUN=${{ inputs.dry }} — if true, pass --dry to push_brief invocations.
            - Use web_search for current week macro/news.
            - Use Agent tool with model=sonnet for formatting step.

            REQUIRED progress markers — print these via Bash echo at the start of
            each major step so the workflow log can confirm reach:
              echo "::group::STAGE-1 gather state"     (before §2)
              echo "::group::STAGE-2 web search"        (before §3 web research)
              echo "::group::STAGE-3 synthesize JSON"   (before §4)
              echo "::group::STAGE-4 sonnet format"     (before §5a)
              echo "::group::STAGE-5 push brief"        (before §5b push_brief.py)
              echo "::group::STAGE-6 push decisions"    (before §5c push_decisions.py)
              echo "::group::STAGE-DONE"                (at the end)
            If you decide to skip a stage (e.g. empty week per §5c guidance),
            print "::warning::STAGE-N skipped because <reason>" so we know.
        env:
          OAUTH_TOKEN_JSON: ${{ secrets.OAUTH_TOKEN_JSON }}
          SHEET_ID:         ${{ secrets.SHEET_ID }}
          DRIVE_FOLDER_ID:  ${{ secrets.DRIVE_FOLDER_ID }}

      - name: Diagnostic — dump any agent artifacts left in /tmp
        if: always()
        run: |
          echo "::group::tmp listing"
          ls -la /tmp/ | grep -iE "wsr|decisions|payload" || echo "no relevant /tmp files"
          echo "::endgroup::"
          for f in /tmp/wsr_lite_payload.json /tmp/wsr_lite_decisions.json /tmp/wsr_decisions.json /tmp/wsr_lite_recs.json; do
            if [ -f "$f" ]; then
              echo "::group::$f"
              wc -c "$f"
              cat "$f" | head -50
              echo "::endgroup::"
            fi
          done
