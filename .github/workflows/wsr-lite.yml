name: WSR Lite — Mid-Week Pulse (Wed/Fri 19:30 SGT)

on:
  schedule:
    # 11:33 UTC Wed and Fri = 19:33 SGT
    - cron: "33 11 * * 3,5"
  workflow_dispatch:
    inputs:
      dry:
        type: boolean
        default: false
      skip_web:
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: wsr-lite
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OAUTH_TOKEN_JSON:  ${{ secrets.OAUTH_TOKEN_JSON }}
      SHEET_ID:          ${{ secrets.SHEET_ID }}
      DRIVE_FOLDER_ID:   ${{ secrets.DRIVE_FOLDER_ID }}
      MODEL_OPUS:        ${{ vars.MODEL_OPUS   || 'claude-opus-4-7' }}
      MODEL_SONNET:      ${{ vars.MODEL_SONNET || 'claude-sonnet-4-6' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Generate WSR Lite
        run: |
          ARGS=""
          if [ "${{ inputs.dry }}" = "true" ]; then ARGS="$ARGS --dry"; fi
          if [ "${{ inputs.skip_web }}" = "true" ]; then ARGS="$ARGS --skip-web"; fi
          python scripts/generate_wsr_lite.py $ARGS
