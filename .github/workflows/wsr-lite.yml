name: WSR Lite — Claude Code (Max)

on:
  schedule:
    # 11:33 UTC Wed/Fri = 19:33 SGT
    - cron: "33 11 * * 3,5"
  workflow_dispatch:
    inputs:
      dry:
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: read
  issues: read
  id-token: write

concurrency:
  group: wsr-lite
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run WSR Lite brain
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Read prompts/cron_wsr_lite.md and execute the workflow.

            CI context:
            - Running on ubuntu-latest; Sheets/Drive auth via env vars (already wired).
            - DRY_RUN=${{ inputs.dry }} — if true, pass --dry to push_brief invocations.
            - Use web_search for current week macro/news.
            - Use Agent tool with model=sonnet for formatting step.
        env:
          OAUTH_TOKEN_JSON: ${{ secrets.OAUTH_TOKEN_JSON }}
          SHEET_ID:         ${{ secrets.SHEET_ID }}
          DRIVE_FOLDER_ID:  ${{ secrets.DRIVE_FOLDER_ID }}
