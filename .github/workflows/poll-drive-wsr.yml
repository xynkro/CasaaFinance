name: Poll Drive WSR — 3x Daily Pickup

on:
  schedule:
    # 3x daily — WSR uploads are manual, no need for 48 runs/day
    # Offset to :08 (was :00) to stagger off sheet-write pileups: the 12:00 Sun
    # trio (finnhub-analyst, options-yield) and the 18:00 Mon-Fri trigger-alerts
    # */10 tick — all write the one Sheet. Avoids 429s; same 3x/day frequency.
    - cron: "8 6,12,18 * * *"
  workflow_dispatch:
    inputs:
      force_id:
        description: "Force-process a specific Drive file ID"
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: poll-drive-wsr
  cancel-in-progress: true

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      OAUTH_TOKEN_JSON: ${{ secrets.OAUTH_TOKEN_JSON }}
      SHEET_ID:         ${{ secrets.SHEET_ID }}
      DRIVE_FOLDER_ID:  ${{ secrets.DRIVE_FOLDER_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Poll Drive folders
        run: |
          if [ -n "${{ inputs.force_id }}" ]; then
            python scripts/poll_drive_wsr.py --force-id "${{ inputs.force_id }}"
          else
            python scripts/poll_drive_wsr.py
          fi
