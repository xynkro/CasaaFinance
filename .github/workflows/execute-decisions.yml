name: Execute Decisions — Alpaca Paper Trading (RETIRED)

# RETIRED 2026-06-03 — consolidated into ONE pipeline. The auto-trader is now
# build-daily-plan.yml → alpaca-paper-execute.yml (daily_plan = the single source
# of truth; recommendation = execution). This second executor caused the
# bifurcation Caspar flagged ("it traded things that weren't in my recommendations").
# Schedule DISABLED; left dispatch-only so legacy decision_queue ACT_NOW items can
# still be run by hand if ever needed. Do NOT re-enable the schedule.
#
# REQUIRED SECRETS: ALPACA_API_KEY_ID, ALPACA_API_SECRET_KEY

on:
  # schedule:                 # DISABLED — one pipeline only (see header)
  #   - cron: "0 0 * * 1-5"
  workflow_dispatch:
    inputs:
      dry:
        type: boolean
        default: false
        description: "Dry run (print plan, no orders)"

permissions:
  contents: read

concurrency:
  group: execute-decisions
  cancel-in-progress: true

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      OAUTH_TOKEN_JSON:         ${{ secrets.OAUTH_TOKEN_JSON }}
      SHEET_ID:                 ${{ secrets.SHEET_ID }}
      TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
      ALPACA_API_KEY_ID:        ${{ secrets.ALPACA_API_KEY_ID }}
      ALPACA_API_SECRET_KEY:    ${{ secrets.ALPACA_API_SECRET_KEY }}
      ALPACA_BASE_URL:          "https://paper-api.alpaca.markets"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Execute decisions
        run: |
          ARGS=""
          if [ "${{ inputs.dry }}" = "true" ]; then ARGS="$ARGS --dry"; fi
          python scripts/execute_decisions.py $ARGS

      - name: Sync Alpaca positions to Sheets
        run: python scripts/sync_alpaca.py
