# Risk Parity LITE targets — GROWTH-TILTED, all-rounded (revamped 2026-05-30).
#
# Philosophy (deliberate, after the "why am I being fed bonds?" review):
#   These are SMALL, growth-oriented accounts, not large portfolios being
#   preserved. So the book is GROWTH-DOMINANT, with a CAPPED protector sleeve
#   and a real (convex) hedge — not an all-weather risk-parity allocation.
#
#   Three jobs, kept distinct:
#     • GROWTH (offense)    — equity_us + intl + dividend ~= 68-74%. Where wealth
#       is actually built; the CSP/CC wheel overlays this (income lowers basis).
#     • PROTECTOR (ballast) — bonds + gold + commodities ~= 21-25%. Cushions
#       ORDINARY dips + funds rebalancing. Bonds are tilted to INTERMEDIATE
#       (IEF) over LONG (TLT): bond_long is now SMALL because TLT is a leveraged
#       rate bet, not protection. Gold covers the inflation case bonds miss.
#     • HEDGE (convex)      — vol_long ~= 5-7% as a passive long-vol ballast,
#       COMPLEMENTED by the active, regime-gated put-spread hedge in
#       scripts/tail_hedge_run.py (the real tail insurance).
#
# Each account sums to 100. Asset classes must match the 8 canonical labels in
# src/watchlist.CANONICAL_ASSET_CLASSES. Read by scripts/risk_parity_audit.py.
#
#   - Caspar: small (~$8-9k), AGGRESSIVE growth tilt (74% growth).
#   - Sarah:  larger (~S$59k), BALANCED (68% growth, SCHD-anchored).

caspar:
  equity_us: 64          # primary risk asset — the growth engine (SPY/QQQ + names)
  equity_us_dividend: 5
  equity_intl: 5
  bond_long: 6           # TLT/EDV — CAPPED (was 15): high-duration rate bet, not protection
  bond_intermediate: 7   # IEF — the justified protector bond (recession ballast, low rate risk)
  gold: 5                # GLDM/GLD — inflation/crisis protector
  commodities_broad: 3   # DBC/USO/SLV — trimmed
  vol_long: 5            # VIXM — passive long-vol ballast (active hedge layer adds convexity)

sarah:
  equity_us: 46
  equity_us_dividend: 15  # SCHD-anchored
  equity_intl: 7
  bond_long: 8            # CAPPED (was 12) — lean to IEF, less TLT
  bond_intermediate: 8    # IEF
  gold: 6
  commodities_broad: 3
  vol_long: 7
